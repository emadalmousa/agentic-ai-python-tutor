services:
  - type: web
    name: agentic-ai-python-tutor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o
      - key: RAG_VECTORSTORE_PATH
        value: /tmp/vectorstore
